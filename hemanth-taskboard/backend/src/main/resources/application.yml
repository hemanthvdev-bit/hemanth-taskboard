spring:
  application:
    name: taskboard

  datasource:
    url: jdbc:postgresql://localhost:5432/taskboard
    username: ${DB_USERNAME:taskboard_user}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: always

jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-to-something-much-longer-and-random}
  expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
